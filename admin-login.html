<!DOCTYPE html>
<html>

<head>

<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:black;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#D4AF37;
}

</style>

</head>

<body>

<div class="login-box">

<img src="images/logo.png" style="width:80px;border-radius:50%;display:block;margin:auto;">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Admin Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error" style="color:red;"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBvdBYSLanVfnz5TiTWAyxIKPbee8fMDYw",
authDomain: "rare-mens-clothing.firebaseapp.com",
projectId: "rare-mens-clothing",
storageBucket: "rare-mens-clothing.appspot.com",
messagingSenderId: "409895222910",
appId: "1:409895222910:web:dca2c6d2431730077ba22f"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function(){

let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(email === "" || password === ""){

document.getElementById("error").innerText = "Please enter email and password";
return;

}

signInWithEmailAndPassword(auth,email,password)

.then(()=>{

window.location.href="admin.html";

})

.catch((error)=>{

document.getElementById("error").innerText = "Invalid login credentials";

});

}

</script>

</body>
</html>
